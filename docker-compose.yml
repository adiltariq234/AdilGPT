version: "3.8"

services:
  app:
    build: .
    container_name: adilgpt-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ENV=production
      - DATABASE_URL=sqlite:///data/chatbot_memory.db
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

